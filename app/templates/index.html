<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPC UA Browser</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- HEADER -->
<header id="topbar">
  <div id="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="3" x2="12" y2="1"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="3" y1="12" x2="1" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </svg>
    OPC UA Browser
  </div>
  <div id="status-bar">
    <span id="status-text" class="status-idle">Keine aktive Verbindung</span>
  </div>
</header>

<!-- MAIN LAYOUT -->
<div id="layout">

  <!-- LEFT: Connections + Favorites -->
  <aside id="left-panel">
    <div class="panel-section">
      <div class="panel-section-header">
        <span>Verbindungen</span>
        <button id="btn-add-conn" class="icon-btn" title="Neue Verbindung">&#xff0b;</button>
      </div>
      <div id="connection-list"></div>
    </div>
    <div class="panel-section" id="favorites-section">
      <div class="panel-section-header">
        <span>Favoriten</span>
      </div>
      <div id="favorites-list"><p class="hint">Keine Verbindung aktiv</p></div>
    </div>
  </aside>

  <!-- CENTER: Address Space Tree -->
  <section id="tree-panel">
    <div class="panel-toolbar">
      <span class="panel-title">Adressraum</span>
      <button id="btn-refresh-tree" class="icon-btn" title="Aktualisieren">&#8635;</button>
    </div>
    <div id="tree-container">
      <p class="hint">Verbindung herstellen um den Adressraum zu browsen</p>
    </div>
  </section>

  <!-- RIGHT: Node Details -->
  <aside id="detail-panel">
    <div class="panel-toolbar">
      <span class="panel-title">Knotendetails</span>
      <button id="btn-fav-toggle" class="icon-btn" title="Als Favorit speichern" style="display:none">&#9733;</button>
    </div>
    <div id="detail-tabs">
      <button class="tab-btn active" data-tab="attributes">Attribute</button>
      <button class="tab-btn" data-tab="value">Wert</button>
      <button class="tab-btn" data-tab="references">Referenzen</button>
    </div>
    <div id="detail-content">
      <p class="hint">Knoten auswaehlen</p>
    </div>
  </aside>

</div>

<!-- LOG FOOTER -->
<footer id="log-footer">
  <div id="log-header">
    <span>Log</span>
    <button id="btn-clear-log" class="icon-btn" title="Log leeren">&#10005;</button>
  </div>
  <div id="log-list"></div>
</footer>

<!-- CONNECTION MODAL -->
<div id="modal-conn" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-conn-title">Neue Verbindung</h2>
      <button class="modal-close" data-modal="modal-conn">&#10005;</button>
    </div>
    <div class="modal-body">
      <label>Name<input id="cf-name" type="text" placeholder="Mein Server" /></label>
      <label>Endpoint URL<input id="cf-url" type="text" placeholder="opc.tcp://localhost:4840" /></label>
      <label>Benutzername (optional)<input id="cf-username" type="text" /></label>
      <label>Passwort (optional)<input id="cf-password" type="password" /></label>
      <div class="form-row">
        <label style="flex:1">Sicherheitsmodus
          <select id="cf-security-mode">
            <option value="1">None</option>
            <option value="2">Sign</option>
            <option value="3">SignAndEncrypt</option>
          </select>
        </label>
        <label style="flex:1">Sicherheitsrichtlinie
          <select id="cf-security-policy">
            <option value="None">None</option>
            <option value="Basic128Rsa15">Basic128Rsa15</option>
            <option value="Basic256">Basic256</option>
            <option value="Basic256Sha256">Basic256Sha256</option>
            <option value="Aes128_Sha256_RsaOaep">Aes128_Sha256_RsaOaep</option>
          </select>
        </label>
        <label style="width:100px">Timeout (s)<input id="cf-timeout" type="number" value="10" min="1" max="120" /></label>
      </div>
      <label>Beschreibung<input id="cf-description" type="text" placeholder="" /></label>
    </div>
    <div class="modal-footer">
      <button id="btn-conn-cancel" class="btn-secondary">Abbrechen</button>
      <button id="btn-conn-save" class="btn-primary">Speichern</button>
    </div>
  </div>
</div>

<!-- WRITE VALUE MODAL -->
<div id="modal-write" class="modal hidden">
  <div class="modal-box" style="max-width:440px">
    <div class="modal-header">
      <h2>Wert schreiben</h2>
      <button class="modal-close" data-modal="modal-write">&#10005;</button>
    </div>
    <div class="modal-body">
      <p id="write-node-label" class="hint" style="font-size:0.8rem;word-break:break-all"></p>
      <label>Neuer Wert<input id="write-value-input" type="text" /></label>
      <p id="write-type-hint" class="hint" style="font-size:0.75rem;margin-top:4px"></p>
    </div>
    <div class="modal-footer">
      <button id="btn-write-cancel" class="btn-secondary">Abbrechen</button>
      <button id="btn-write-confirm" class="btn-primary">Schreiben</button>
    </div>
  </div>
</div>

<!-- SERVER INFO MODAL -->
<div id="modal-server-info" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Server Informationen</h2>
      <button class="modal-close" data-modal="modal-server-info">&#10005;</button>
    </div>
    <div class="modal-body"><div id="server-info-content"></div></div>
    <div class="modal-footer">
      <button class="btn-secondary modal-close" data-modal="modal-server-info">Schliessen</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/app.js"></script>
</body>
</html>
